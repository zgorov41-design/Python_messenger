<!DOCTYPE html>
<html>
<head>
    <title>Messenger</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        #messages { list-style-type: none; padding: 0; max-height: 400px; overflow-y: auto; }
        .message { margin: 10px 0; padding: 8px; border-bottom: 1px solid #292929; }
        .username { font-weight: bold; color: #0094c9; }
    </style>
</head>
<body>
    <h1>Мессенджер на Flask + SocketIO</h1>
    
    <div>
        <input type="text" id="username" placeholder="Ваше имя" value="Гость">
        <button onclick="joinChat()">Войти</button>
    </div>
    
    <ul id="messages"></ul>
    
    <div>
        <input type="text" id="messageInput" placeholder="Введите сообщение..." disabled>
        <button id="sendButton" onclick="sendMessage()" disabled>Отправить</button>
    </div>

    <script>
        const socket = io();

        socket.on('connect', () => {
            console.log('Подключено к серверу');
            joinChat();
        });

        socket.onAny((eventName, ...args) => {
            console.log('Получено событие:', eventName, 'данные:', args);
        });

        socket.on('disconnect', () => {
            console.log('Отключено от сервера');
        });

        let username = '';
        
        function joinChat() {
            username = document.getElementById('username').value || 'Гость';
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendButton').disabled = false;
            
            socket.emit('join_room', {
                username: username,
                room: 'main_chat'
            });
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (text) {
                console.log('Отправляем сообщение:', {username, text, room: 'main_chat'});
                socket.emit('send_message', {
                    username: username,
                    text: text,
            room: 'main_chat'
                });
                input.value = '';
            }
        }
        
        socket.on('new_message', function(data) {
            console.log('Обработчик new_message вызван', data);
            const messages = document.getElementById('messages');
            const li = document.createElement('li');
            li.className = 'message';
            li.innerHTML = '<span class="username">' + data.username + '</span> [' + data.timestamp + ']: ' + data.text;
            messages.appendChild(li);
            messages.scrollTop = messages.scrollHeight;
        });
        
        socket.on('status', function(data) {
            console.log('Получен статус:', data);
            const messages = document.getElementById('messages');
            const li = document.createElement('li');
            li.style.color = 'gray';
            li.textContent = data.msg;
            messages.appendChild(li);
            messages.scrollTop = messages.scrollHeight;
        });
        
        socket.on('message_history', function(history) {
            console.log('Получена история:', history);
            const messages = document.getElementById('messages');
            history.forEach(msg => {
                const li = document.createElement('li');
                li.className = 'message';
                li.innerHTML = '<span class="username">' + msg.username + '</span> [' + msg.timestamp + ']: ' + msg.text;
                messages.appendChild(li);
            });
            messages.scrollTop = messages.scrollHeight;
        });
    </script>
</body>
</html>
